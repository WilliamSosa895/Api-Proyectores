# ── Servidor ──────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── PostgreSQL ────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/proyectores_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# validate: Hibernate verifica que las tablas existen, no las crea ni modifica
# Cambia a "update" solo en desarrollo si quieres que Hibernate ajuste columnas
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── MQTT / EMQX ───────────────────────────────────────────────
# Estas propiedades las lee MqttConfig.java con @Value
mqtt.broker-url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client-id=springboot-api
mqtt.username=
mqtt.password=

# Topics a los que el API se suscribe (estados de los emuladores)
# El wildcard + cubre un nivel: aulas/aula-1/light/state, etc.
mqtt.topic.subscribe=aulas/+/+/state

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=ProyectoresAulasClaveSecreta2024Sistema
jwt.expiration-ms=28800000

# ── WebSocket ─────────────────────────────────────────────────
# Endpoint al que React se conecta: ws://192.168.1.10:8080/ws
# Los destinos STOMP que React escucha: /topic/aulas/{aulaId}/lux
#                                        /topic/aulas/{aulaId}/dispositivos

# ── Logging ───────────────────────────────────────────────────
logging.level.com.proyecto.api=INFO
logging.level.org.eclipse.paho=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
